name: Binary Releases

on:
  push:
    tags:
      - 'changelogs@*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. changelogs@0.3.0)'
        required: true

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: changelogs-linux-amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: changelogs-darwin-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: changelogs-darwin-arm64
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.tag || github.ref }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}
          save-if: ${{ github.event_name != 'push' }}
      - run: cargo build --release --target ${{ matrix.target }}
      - run: strip target/${{ matrix.target }}/release/changelogs
      - run: mv target/${{ matrix.target }}/release/changelogs ${{ matrix.asset }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  upload:
    name: Upload Release Assets
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: artifacts/*
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: latest
          prerelease: true
          files: artifacts/*
          body: "Latest build from ${{ inputs.tag || github.ref_name }}. Updated on every release."
