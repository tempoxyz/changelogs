name: Changelog

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  check-changelog:
    # Skip for fork PRs - we can't write to forks and can't checkout their branches.
    # Skip for Dependabot PRs - they don't have access to ANTHROPIC_API_KEY and dep
    # bumps are summarized in the release PR by the changelogs action itself.
    if: |
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code@2.1.105

      - name: Check changelogs
        uses: ./check
        timeout-minutes: 5
        with:
          ai: 'claude -p --dangerously-skip-permissions'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
